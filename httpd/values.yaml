# Default values for httpd.

replicaCount: 10

image:
  repository: httpd
  pullPolicy: IfNotPresent
  tag: "2.4.54-alpine3.16"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: NodePort
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
  - host: chart-example.local
    paths:
      - path: /
        pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
        topologyKey: topology.kubernetes.io/zone

httpd:
  vHosts:
    enabled: true
    defaultHosts:
      healthcheck.conf: |
        <VirtualHost *:80>
          ErrorDocument 200 "healthy"
          RewriteEngine On
          RewriteRule ^/healthcheck - [R=200]

          ErrorLog /dev/stderr
          CustomLog /dev/null common
        </VirtualHost>
    additionalHosts: {}
  config:
    enabled: true
    files:
      # docker run --rm httpd:2.4.52 cat /usr/local/apache2/conf/httpd.conf | grep -Ev "^\ *\#|^$"
      httpd.conf: |
        ServerRoot "/usr/local/apache2"
        Listen 80

        LoadModule mpm_event_module modules/mod_mpm_event.so
        LoadModule authn_file_module modules/mod_authn_file.so
        LoadModule authn_dbm_module modules/mod_authn_dbm.so
        LoadModule authn_anon_module modules/mod_authn_anon.so
        LoadModule authn_dbd_module modules/mod_authn_dbd.so
        LoadModule authn_socache_module modules/mod_authn_socache.so
        LoadModule authn_core_module modules/mod_authn_core.so
        LoadModule authz_host_module modules/mod_authz_host.so
        LoadModule authz_groupfile_module modules/mod_authz_groupfile.so
        LoadModule authz_user_module modules/mod_authz_user.so
        LoadModule authz_dbm_module modules/mod_authz_dbm.so
        LoadModule authz_owner_module modules/mod_authz_owner.so
        LoadModule authz_dbd_module modules/mod_authz_dbd.so
        LoadModule authz_core_module modules/mod_authz_core.so
        LoadModule access_compat_module modules/mod_access_compat.so
        LoadModule auth_basic_module modules/mod_auth_basic.so
        LoadModule auth_form_module modules/mod_auth_form.so
        LoadModule auth_digest_module modules/mod_auth_digest.so
        LoadModule allowmethods_module modules/mod_allowmethods.so
        LoadModule file_cache_module modules/mod_file_cache.so
        LoadModule cache_module modules/mod_cache.so
        LoadModule cache_disk_module modules/mod_cache_disk.so
        LoadModule cache_socache_module modules/mod_cache_socache.so
        LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
        LoadModule socache_dbm_module modules/mod_socache_dbm.so
        LoadModule socache_memcache_module modules/mod_socache_memcache.so
        LoadModule socache_redis_module modules/mod_socache_redis.so
        LoadModule watchdog_module modules/mod_watchdog.so
        LoadModule macro_module modules/mod_macro.so
        LoadModule dbd_module modules/mod_dbd.so
        LoadModule dumpio_module modules/mod_dumpio.so
        LoadModule buffer_module modules/mod_buffer.so
        LoadModule ratelimit_module modules/mod_ratelimit.so
        LoadModule reqtimeout_module modules/mod_reqtimeout.so
        LoadModule ext_filter_module modules/mod_ext_filter.so
        LoadModule request_module modules/mod_request.so
        LoadModule include_module modules/mod_include.so
        LoadModule filter_module modules/mod_filter.so
        LoadModule substitute_module modules/mod_substitute.so
        LoadModule sed_module modules/mod_sed.so
        LoadModule deflate_module modules/mod_deflate.so
        LoadModule mime_module modules/mod_mime.so
        LoadModule log_config_module modules/mod_log_config.so
        LoadModule log_debug_module modules/mod_log_debug.so
        LoadModule logio_module modules/mod_logio.so
        LoadModule env_module modules/mod_env.so
        LoadModule expires_module modules/mod_expires.so
        LoadModule headers_module modules/mod_headers.so
        LoadModule unique_id_module modules/mod_unique_id.so
        LoadModule setenvif_module modules/mod_setenvif.so
        LoadModule version_module modules/mod_version.so
        LoadModule remoteip_module modules/mod_remoteip.so
        LoadModule proxy_module modules/mod_proxy.so
        LoadModule proxy_connect_module modules/mod_proxy_connect.so
        LoadModule proxy_ftp_module modules/mod_proxy_ftp.so
        LoadModule proxy_http_module modules/mod_proxy_http.so
        LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so
        LoadModule proxy_scgi_module modules/mod_proxy_scgi.so
        LoadModule proxy_uwsgi_module modules/mod_proxy_uwsgi.so
        LoadModule proxy_fdpass_module modules/mod_proxy_fdpass.so
        LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
        LoadModule proxy_ajp_module modules/mod_proxy_ajp.so
        LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
        LoadModule proxy_express_module modules/mod_proxy_express.so
        LoadModule proxy_hcheck_module modules/mod_proxy_hcheck.so
        LoadModule session_module modules/mod_session.so
        LoadModule session_cookie_module modules/mod_session_cookie.so
        LoadModule session_dbd_module modules/mod_session_dbd.so
        LoadModule slotmem_shm_module modules/mod_slotmem_shm.so
        LoadModule ssl_module modules/mod_ssl.so
        LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so
        LoadModule lbmethod_bytraffic_module modules/mod_lbmethod_bytraffic.so
        LoadModule lbmethod_bybusyness_module modules/mod_lbmethod_bybusyness.so
        LoadModule lbmethod_heartbeat_module modules/mod_lbmethod_heartbeat.so
        LoadModule unixd_module modules/mod_unixd.so
        LoadModule dav_module modules/mod_dav.so
        LoadModule status_module modules/mod_status.so
        LoadModule autoindex_module modules/mod_autoindex.so
        LoadModule info_module modules/mod_info.so
        LoadModule cgi_module modules/mod_cgi.so
        LoadModule dav_fs_module modules/mod_dav_fs.so
        LoadModule vhost_alias_module modules/mod_vhost_alias.so
        LoadModule negotiation_module modules/mod_negotiation.so

        <IfModule !mpm_prefork_module>
                #LoadModule cgid_module modules/mod_cgid.so
        </IfModule>
        <IfModule mpm_prefork_module>
                #LoadModule cgi_module modules/mod_cgi.so
        </IfModule>
        LoadModule dir_module modules/mod_dir.so
        LoadModule actions_module modules/mod_actions.so
        LoadModule speling_module modules/mod_speling.so
        LoadModule userdir_module modules/mod_userdir.so
        LoadModule alias_module modules/mod_alias.so

        LoadModule rewrite_module modules/mod_rewrite.so

        <IfModule unixd_module>
        User www-data
        Group www-data
        </IfModule>

        ServerAdmin you@example.com

        <Directory />
            AllowOverride none
            Require all denied
        </Directory>

        DocumentRoot "/usr/local/apache2/htdocs"

        <Directory "/usr/local/apache2/htdocs">
            Options Indexes FollowSymLinks
            AllowOverride None
            Require all granted
        </Directory>

        <IfModule dir_module>
            DirectoryIndex index.html
        </IfModule>

        <Files ".ht*">
            Require all denied
        </Files>

        CustomLog /dev/stdout combined
        ErrorLog  /dev/stderr
        LogLevel warn

        <IfModule log_config_module>
            LogFormat "%{Host}i %{X-Forwarded-For}i (%h) %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %D %p %X %f" combined
            LogFormat "%h %l %u %t \"%r\" %>s %b" common

            <IfModule logio_module>
              LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %I %O" combinedio
            </IfModule>

            CustomLog /proc/self/fd/1 common
        </IfModule>

        <IfModule alias_module>
            ScriptAlias /cgi-bin/ "/usr/local/apache2/cgi-bin/"
        </IfModule>

        <IfModule cgid_module>
        </IfModule>

        <Directory "/usr/local/apache2/cgi-bin">
            AllowOverride None
            Options None
            Require all granted
        </Directory>

        <IfModule headers_module>
            RequestHeader unset Proxy early
        </IfModule>

        <IfModule mime_module>
            TypesConfig conf/mime.types

            AddType application/x-compress .Z
            AddType application/x-gzip .gz .tgz
        </IfModule>

        Include conf/extra/httpd-mpm.conf
        Include conf/extra/httpd-default.conf

        <IfModule proxy_html_module>
        Include conf/extra/proxy-html.conf
        </IfModule>

        <IfModule ssl_module>
        SSLRandomSeed startup builtin
        SSLRandomSeed connect builtin
        </IfModule>

        # https://httpd.apache.org/docs/2.4/mod/core.html#include
        Include conf/extra/vHosts-*.conf

        TraceEnable Off
        Header edit Set-Cookie "(?i)^((?:(?!;\s?HttpOnly|s3url|XSRF-TOKEN|pxcelUrl).)+)$" "$1; HttpOnly"
        Header set X-Content-Type-Options nosniff
        Header set X-XSS-Protection "1; mode=block"
        Header set Cache-Control "no-store"
        Header set Pragma "no-cache"
        Header set X-Robots-Tag "noindex"
        SetOutputFilter DEFLATE
